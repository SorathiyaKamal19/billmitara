<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bill Mitara - Smart Restaurant POS</title>
  </head>
  <body>
    <div id="root">
      <style>
        :root {
          --app-main-color-rgb: 20 130 122;
        }

        html,
        body,
        #root {
          min-height: 100%;
        }

        body {
          margin: 0;
          font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
          background:
            radial-gradient(circle at top left, rgb(var(--app-main-color-rgb) / 0.12), transparent 34rem),
            radial-gradient(circle at bottom right, rgb(14 165 233 / 0.08), transparent 30rem),
            linear-gradient(135deg, #f8fafc 0%, #f3faf9 48%, #eef6ff 100%);
        }

        .initial-loader {
          display: grid;
          min-height: 100dvh;
          place-items: center;
          padding: 24px;
          color: #101828;
        }

        .initial-loader-card {
          display: flex;
          align-items: center;
          gap: 14px;
          border: 1px solid rgba(255, 255, 255, 0.72);
          border-radius: 8px;
          background: rgba(255, 255, 255, 0.88);
          padding: 14px 16px;
          box-shadow: 0 18px 60px rgba(16, 24, 40, 0.14);
          backdrop-filter: blur(18px);
        }

        .initial-loader-mark {
          display: grid;
          width: 40px;
          height: 40px;
          place-items: center;
          border-radius: 8px;
          background: rgb(var(--app-main-color-rgb));
          color: #ffffff;
          font-weight: 900;
        }

        .initial-loader-spinner {
          width: 18px;
          height: 18px;
          border: 2px solid rgb(var(--app-main-color-rgb) / 0.2);
          border-top-color: rgb(var(--app-main-color-rgb));
          border-radius: 999px;
          animation: initial-loader-spin 0.8s linear infinite;
        }

        .initial-loader-title {
          margin: 0;
          font-size: 15px;
          font-weight: 900;
        }

        .initial-loader-text {
          margin: 2px 0 0;
          font-size: 12px;
          font-weight: 700;
          color: #667085;
        }

        @keyframes initial-loader-spin {
          to {
            transform: rotate(360deg);
          }
        }
      </style>
      <div class="initial-loader">
        <div class="initial-loader-card">
          <div class="initial-loader-mark">B</div>
          <div>
            <p class="initial-loader-title">BillMitara</p>
            <p class="initial-loader-text">Loading your workspace...</p>
          </div>
          <div class="initial-loader-spinner" aria-hidden="true"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
